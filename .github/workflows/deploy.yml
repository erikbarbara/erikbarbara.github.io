name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: essays-by-erik
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build --destination ../essays-built
        working-directory: essays-by-erik

      - name: Assemble site
        run: |
          mkdir -p _deploy
          cp index.html favicon.ico _deploy/
          cp -r css fonts _deploy/
          cp -r essays-built _deploy/essays

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
