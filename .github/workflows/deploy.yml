name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1
        with:
          ruby-version: "3.3"
          working-directory: essays-by-erik
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build --destination ../essays-built
        working-directory: essays-by-erik

      - name: Assemble site
        run: |
          mkdir -p _deploy
          cp index.html favicon.ico _deploy/
          cp -r css fonts _deploy/
          cp -r essays-built _deploy/essays
          cp essays-built/404.html _deploy/404.html

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _deploy

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
