      "2022-04-24-fractal-impostor-html": {
        "title": "Impostor Syndrome is Fractal",
        "tags": "",
        "date": "April 24, 2022",
        "author": "",
        "category": "",
        "content": "  Comparison is the thief of joy.  – UnknownFor those of us who suffer from impostor syndrome, and it’s not everyone, the mark it leaves is indelible. The constant comparison and concern about delivering and keeping up both fuels and depletes. Strivings completed provide an all too brief reprieve. They are ended soon by the question “What’s next?” as you watch your contemporaries push forward while you rest.Impostor syndrome is fractal. It doesn’t fade away. As cyclist Greg LeMond said, “It never gets easier, you just go faster.”No matter your position or talent, the deficit between “their” skill and yours feels constant, infinitely nuanced, and ultimately unclosable.Say you’re a beginner whose skill is 10. Examining someone a bit ahead of you at 100, the delta seems so wide.But even for an expert–say a world class operator in their field–who executes at 1000, the delta between them and someone at 1010 is perceived to be just as wide.This is demonstrated in episode one of Get Back by Peter Jackson.  George Harrison: …the difference between me and, say, Eric, I’m just another guitar, sometimes playing bits and sometimes singing…So…I feel now I can play things. I can learn things that will sound okay, especially fast fingering like that.Paul McCartney: It’s jazz, man.George Harrison: Not really, Just Eric. He’s very good at that. At like, improvising and keeping it going…which I’m not good at.The words alone don’t justify the exchange. George suffers throughout the clip. Here’s one of the most famous, most accomplished musicians forelorn over the gap between himself and Eric Clapton. Mind you, this is after Beatlemania, after fame and fortune has been attained. And yet George Harrison feels underaccomplished, trapped, and lacking.Let’s take a more modern example from the podcast episode How I Built Resilience: M. Night Shyamalan  Guy Raz: How did you overcome self-doubt?M. Night Shyamalan: You don’t. You don’t. I have it right now in front of you. I mean, I just came from the editing room and I have all these issues with this reel and I’m trying to figure it out and the voice inside of you says, “You’re not, you’re not going to figure it out.”…I’m scared to write [my next movie]. Maybe today I won’t be able to think of that thing. My oldest daughter is an artist and I said, “That is your plight. You are going to wrestle with your demons every single day of your life.”If you suffer from impostor syndrome–and I think “suffer” is an appropriate verb to describe its effects–you’re in good company.",
        "url": "/essays//2022/04/24/fractal-impostor.html"
      }

      "2022-01-04-discovering-api-html": {
        "title": "Discovering a Person's API",
        "tags": "",
        "date": "January 4, 2022",
        "author": "",
        "category": "",
        "content": "  The great thing about TCP jokes is that you always get them…I would tell some UDP jokes too but I never know if anyone gets them.Humans are messy.Organizations are made of people and are similarly messy places. This messiness often manifests in tension. The tension can be healthy, akin to agonist-antagonist muscle pairs.Product indexes toward shipping new features. Engineering indexes towards the ever elusive technical debt that “needs” to be paid down.Discovering a person’s and organization’s API is a model I’ve found helpful in reasoning about and navigating these differences.There are all sorts of downsides to focusing on a person’s intentions. The fundamental attribution error comes to mind.I’m not saying that understanding why someone wants something isn’t without value. But it’s wasted effort if there’s a more fundamental miscommunication occurring.This is actually the premise of the DISC assessment. Don’t focus on people’s motivations; rather understand their behavioral tendencies.Reframing the problem to APIs is another way to approach the same concept, one that may resonate with folks who have a technical background.In the example above, Product may better receive a discussion about addressing a technical issue if it’s framed in terms of avoiding an increasing and now imminent likelihood of downtime. That’s the interface that makes interactions more easily understood.One individual I managed was having a hard time getting through to someone on another team. Our conversation went something like this.  EM: I just don’t get it. Everytime I try to review project tradeoffs with $X, it’s like we’re saying the same thing but still disagreeing.Me: I hear you. It’s like they have an entirely different API. Like you’re speaking REST and they’re using gRPC.EM: Exactly!Sometimes the APIs between people and organizations are naturally compatible.Othertimes we’re off by a minor version but one of us is backwards compatible.And sometimes we’re not even speaking the same protocol. One is on HTTP and the other is on Telnet.Here’s another expample. I found that every time a coworker and I discussed a topic we both reiterated our points, which largely seemed to be in agreement. Eventually I’d say something like, “I think we’re in violent agreement.” And they’d agree!Neither of us felt like we could cut the back-and-forth short. We were in an ACK loop not realizing what our APIs were signaling.If you’re having trouble communicating with a person or organization on an issue, consider your respective APIs.Left unexplored is the case where the API differences between two people or a person and org are so fundamentally divirgenct that they’re hopelessly incompatible.",
        "url": "/essays//2022/01/04/discovering-api.html"
      }

      "2021-11-16-okrs-why-html": {
        "title": "OKRs Need a Why",
        "tags": "",
        "date": "November 16, 2021",
        "author": "",
        "category": "",
        "content": "  It’s not a key result unless it has a number.  – Marissa MayerWhat you measure, you manage. OKRs and their predecessors MBOs are great. They’re also incomplete.One unrecognized gap with OKRs, or how many organizations implement them, is that they are agnostic about why something worked. This is an important component of being a product development team.Consider a key result of increasing new user signups by 5%. A product development team responsible for the signup flow could achieve their KR from pure luck or an external influence by a marketing team while they did nothing.While dated, this story of microchip yield rates captures my point.  [The chip fabrication] process only seems straightforward. In reality, the entire operation has about as much built-in voodoo and superstition as a major league baseball team. No one is even quite sure why “yield rates” (the percentage of good chips) are what they are. Thus, when they suddenly fall, there is general panic. When they rise, fab managers scurry about trying to find the magic key. Short of a scientific solution, the managers revert to an almost primitive faith in retaining every vestige of status quo. One of the women wore a “silk blouse that day? Then she’ll wear it every day. Someone else used his left hand rather than his right to dip the wafer in acid? Then from now on he’s a southpaw.  – Michael Malone, The Big ScoreObjective: Extend production quality well beyond best-in-class standardsKey Result: Increase yield rates from X% to Y% by end of quarterI hope that team would have the intellectual honesty to admit they achieved their goal without understanding why. Without doing so, an organization is choosing to not understand why they are effective. I’ve written before about efficiency and process trumping effectiveness and understanding.My understanding is that Todd McKinnon chose VMTs (Vision / Methods / Targets) at Okta instead of OKRs in part of because of this. The methods were much more about the why.So what to do? Certainly let’s not throw out OKRs. But we should require an element to explain why something works, not just that a result was attained.As I was writing this post, Roger Martin wrote a piece titled Stop Letting OKRs Masquerade as Strategy. Martin puts his finger on the same soft spot I’ve been describing applying the lens of his own planning and goals framework. In his own words:  …there is a huge gulf in the middle that OKRs are likely to miss. I say likely because I am sure some practitioners of the OKR approach have a way of filling in the strategy gap. And that gap is an explicit theory of the…choice that will make the objective/aspiration more than a pipe dream. If that gap is filled in the middle, then ‘O’ and ‘KR’ make a perfectly good set of bookends.Yes, measure what matters. And don’t forget to manage toward that by understanding why the key results will help you achieve the objective.",
        "url": "/essays//2021/11/16/okrs-why.html"
      }
      ,
    
      "2021-09-28-we-shape-our-comp-bands-html": {
        "title": "We Shape Our Comp Bands",
        "tags": "",
        "date": "September 28, 2021",
        "author": "",
        "category": "",
        "content": "  We shape our buildings and afterwards our buildings shape us.  – Winston ChurchillThis is a reflection on a recent interaction. I feel self-conscious writing this post. Like most things I learn, it sounds like common sense when stated explicitly.The insight struck me enough though that I’m going to share it.I’ve typically designed comp bands to have even overlap between levels. If one level runs to $120K as a max salary, the next will start with a minimum of $110K.Looking back, this is a product of organizations where budgets for raises are decoupled from budgets for promotions. You retain a great Software Engineer II and reward them for their contributions with a raise while standing in line for their promotion budget for several quarters.Compensation in the software development job market, like pricing in the housing market, has recently come unhinged. In order to stay competitive, we took a pass at redesigning our comp bands.The overlap described above makes sense when you have the budget constraints described. And that was informing my design.However, our VPE (h/t @jondmatthews) suggested something different.He said we should not overlap compensation on the lower levels of our career ladder and instead maintain tigher salary bands. This would force us to recognize strong performance in our less tenured engineers with promotions, not raises.Inversely, we’d design our most senior levels to have broad overlap. This would allow us to reward folks who made great contributions as senior engineers but who may not be ready for the title of principal engineer and the associated organizational impact.Let’s pause for a moment. We can debate the merits of rapid early career promotions, the tradeoffs of up-or-out roles, or the wisdom of a career ladder with N levels. I welcome the coffee we’ll share over that discussion some day.My point is we shape our comp bands and afterwards our comp bands shape us (and our management). In my example above, our budgeting process shapes our comp bands. And something shaped the budgeting process. And…Intentional organizational design matters. Consider it a corollary of Conway’s Law.Design wisely.",
        "url": "/essays//2021/09/28/we-shape-our-comp-bands.html"
      }

      "2021-09-16-dfs-and-bfs-learning-html": {
        "title": "Depth-first and Breadth-first Learning",
        "tags": "",
        "date": "September 16, 2021",
        "author": "",
        "category": "",
        "content": "I’ve encountered two patterns of learning when working with engineers. These patterns apply to most people. But I’ve spent most of my career working with engineers.The two categories are useful to describe where people gravitate. Reality is less binary and is instead a spectrum.I bring these up when onboarding a new engineer to learn how they learn. It’s typically clear in how they approach their first tasks as well.Breadth-first LearningThis is the model I tend toward. I self-deprecatingly call this the StackOverflow Coder.A breadth-first learner scans the solution space and returns to the work when they believe they have minimally viable knowledge.Despite the deprecating name, this shouldn’t be confused with brute forcing. There is intentionality in the learning. The goal is to not over-optimize in depth or expertise of knowledge. The goal is getting to tangible value sooner.If the first scan didn’t result in a workable solution, the learner goes deeper. It’s akin to a breadth-first search algorithm. The learner assumes that nodes in each subsequent layer in the tree require geometrically more effort to learn than the previous depth.Depth-first LearningThese learners tend to be more “ready, aim, aim, aim, fire”.A depth-first learner goes deep into a subject before writing a line of code or starting on the implementation. This is particularly true if it’s their first time working with a concept.They find comfort in developing depth and familiarity with the subject. And the depth of knowledge they gain can pay dividends when the problem being solved has nuance or if they specialize in that subject matter over a long period of time. The trade-off is that tangible results take longer to bootstrap.Trade-offsThere isn’t a right answer about which model is best. There are simply trade-offs and contexts in which to apply each.I find breadth-first works best when starting at a new company. You’re assigned your first task. Your manager picked a starter task. You’re supposed to send a new parameter in an API call.Do you research Rails, controllers, the philosophy, etc.?Or do you dive into the code, reproduce the issue, look at the existing routes, make an educated guess at how to implement the change, and iterate?Conversely, I once worked on a project that required using the OpenID Connect protocol for authentication.My approach was to find a popular library for the framework we were using, install it, and get basic authentication working. I was confident we were 90% done!My manager was a depth-first learner. They printed out (yes on paper) the OIDC spec, sat down at their desk and read it with a highlighter. Then they looked at the source code of the library I had chosen and pointed out two or three important implementation details that had been skipped.I felt a bit like King George III in Hamilton.  I wasn’t aware that was something a person could do.  – I Know Him, HamiltonFrom this experience, I’ve developed a (still too intuitive) heuristic for deciding when I need to go deep on a topic.A strong team is comprised of both types of learners. And mature professionals will know when to adopt their non-dominant approach.  There’s an opportune time to do things, a right time for everything on the earth.  – Ecclesiastes 3:1",
        "url": "/essays//2021/09/16/dfs-and-bfs-learning.html"
      }
      ,
    
      "2021-08-24-buy-in-html": {
        "title": "Buy In",
        "tags": "",
        "date": "August 24, 2021",
        "author": "",
        "category": "",
        "content": "Getting buy in for an idea is an undervalued skill for knowledge workers.It holds new managers back. It separates senior engineers from staff, principal, and beyond.There are myriad ways to get buy in. I want to cover three models I’ve found useful in my own career.Activation EnergyI managed a senior engineer who had “right” ideas that never got buy in. A hyperbolic example follows.  We really need to switch to Python 3, move to protobuf for service-to-service communication, and implement service discovery.This would come as we were encountering a difficult project challenge at crunch time. The tech stack would be Python 2.7 with Twisted, JSON-based REST communication, and a largely monolithic architecture with a few decoupled services.This engineer was perpetually frustrated. They had topped out as a senior engineer for over a decade now. Senior isn’t an up-or-out role (a topic for another day). But a key to moving beyond senior is being able to influence the organization and achieve buy in for your ideas.The coaching I landed on with this engineer centered on activation energy. Think back to high school chemistry.The organization or tech stack or $X is operating at its current energy level. You have an idea that could bring it to a new, better state.The energy required to achieve your new state is untenable for the organization.Could you instead achieve 80% of your goal by making one, palatable suggestion at much lower cost? Instead of changing three variables, what if protobuf alone would help solve the project’s problems?You’re 1/3 of the way to your technical changes. You’ve got 80% of the benefits. The project was pushed along, not delayed further by your ideas.Consider the activation energy the organization will need to accept your idea.Shackleton’s DogsThis is a variant of boiling frogs.To be clear, I learned this at Calibrate SF in 2017 from Karen Catlin’s talk, The Art of the Pre-Meeting.Ernest Shackleton and his crew while stranded in the Antarctic were quickly running out of food.He concluded: we have to kill the dogs.But he couldn’t just say that. So, he visited the men at night around their fires. He’d hear them bemoan the dwindling food supplies. He’d empathize and help them see that the dogs ate many seals per day that could feed several men over days.I imagine he’d ask questions like this.  How many seals did we get today?How many are left?Did you get much?How are the dogs?Are they eating?How much?It sunk in. The dogs were killing the men.And so, when Shackleton finally proposed that they kill the dogs, the men understood.I’ve found that when I “know” what the right idea is, most times I shouldn’t tell the team what we should do. I present the same constraints that I’ve considered.One of two things happens.The team arrives at the same conclusion.Or very often they find more accurate constraints and better solutions.Regardless, because they were part of the process they are bought into the solution.Be careful. Consensus leadership on everything is ineffective. Many decisions though are worth the wait.Get the group to consider the constraints of the problem space you’re working in.That’s RightThe last model comes from Never Split the Difference, the only book I would recommend on negotiation.This “technique” isn’t about negotiation, it’s about relating.As an engineer, it’s my tendency to want to be right. And for others to acknowledge it. That’s ineffective.Others want to be heard.If you’re trying to convince a person of something, it’s more powerful when they say, “that’s right”, not “you’re right”.If they say “you’re right” then you’ve lost because now they’ve resigned.If you echo their positions and they say, “that’s right”, they’re now ready to listen. They know you heard them out.It’s better to be effective than to be right.",
        "url": "/essays//2021/08/24/buy-in.html"
      }
      ,
    
      "2021-08-06-own-it-html": {
        "title": "Own It",
        "tags": "",
        "date": "August 6, 2021",
        "author": "",
        "category": "",
        "content": "  A friend recently complained about how inefficient his employer is. Processes are poor, communication is bad. He then said a competitor company had its act together. I asked him how he knew that – he’s never worked there and has never been inside the company. Fair, he said. It just seems that way from the outside.  But almost everything looks better from the outside. I guarantee workers at the competitor find flaws in the way their company operates, because they know about their company what my friend knows about his: how the sausage is made. All the messy personalities and difficult decisions that you only see when you’re inside, in the trenches. “All businesses are loosely functioning disasters” Brent Beshore says. But it’s like an iceberg, only a fraction is visible.  – Harder Than It Looks, Not As Fun as It Seems, Collaborative FundI’m not a Sales Engineer but I occasionally play one on Zoom calls.I’ve written about the differences in assessing sales vs engineering performance.There’s a similar dichotomy for feedback, especially critical feedback that pertains to relational dynamics. The culture must be strongly cultivated in engineering organizations. It seems to come much easier in sales.I enjoy the blunt feedback and rigorous analysis of interactions from sales professionals.I’ve hopped off calls and had Account Executives with 15 years selling ask me:  What did you think?What was strong?Where did I suck?They then go on to self-criticize before giving me unsolicited feedback on what to change.One great piece of feedback I received was about “owning it.”Our product had a particular weakness in comparison to our competitors. When I discussed our approach, I’d often caveat my explanation with, “This is how we approach this…for now.” I’d hesitate.After hearing me do this on a few of their calls, one of the Account Executives I worked with said:  Drop the hesitancy.Tell the prospect what we do and why.They don’t know and don’t need to know this is a point of internal discussion.The solution works; it’s just different.Own it.",
        "url": "/essays//2021/08/06/own-it.html"
      }
      ,
    
      "2021-07-26-behavioral-interviews-made-simple-html": {
        "title": "Behavioral Interviewing Made Simple (Interviewees)",
        "tags": "",
        "date": "July 26, 2021",
        "author": "",
        "category": "",
        "content": "Here’s a SWAG: over the past 6.5 years I’ve conducted over 2 interviews per week tallying over 650 in total. I performed over 15 in a single week running the Duo Engineering internship program.The compendium includes systems design sessions, algorithmic coding assessments, and introductory phone interviews. Behavioral interviews were the most prevalent.Behavorial interviewing posits that past behavior is the best predictor of future success.Questions often follow the form “Tell me about a time when…” or “Have you ever…?”  Tell me about a time you provided critical feedback to a boss or superior.I’m not as interested in what you’d do in a hypothetical situation. Instead, I want you to show me what you have done in reality.There are weaknesses to this approach.Less tenured candidates may not have experienced different scenarios. An entry-level candidate may never have provided critical feedback to a superior.A poor interviewee may get filtered out by a poor interviewer: someone who doesn’t continue to probe and ask questions to draw the candidate out.Yet, I’ve seen workplace behaviors from hires repeatedly prove the value of behavioral interviews.It makes me sad when I see candidates overthink behavioral interview questions. I’m not trying to entrap the candidate. I’m not looking for one right answer; there are many. I want to hire great people. And I want great people to do well in their interviews.Below are 3 principles to follow as an interviewee.Tell a StoryReally. Don’t tell me what you would do (more on that later).If you can’t think of a story immediately, ask for a moment to collect your thoughts. I’d rather have you sit for 20 seconds in silence. Provide a meaningful anecdote rather than tell me something has never happened to you.If you can’t think of a story that’s an exact match, tell something that’s proximate. Tell me:  I don’t know if this will be an exact match but I think it will help you understand a similar scenario.Telling stories involves details.Yes, you could study and follow the STAR model. Or treat me like a human.  We were working on this project…This was my role and who else was involved…Here was the problem…Here’s what I did and how others were involved…This is how it ended up…You know that old saying, if you always tell the truth you don’t have to remember what you told someone? Do that too.I’ll ask a lot of follow-up questions. I’m trying to paint a picture of how you behave.  You mentioned telling your boss that it hurt morale when they…Did that conversation happen over Slack, email, face-to-face?…How did you know it hurt morale?I get that you might be drawing on a 5 year old event. I’m not deposing you, and you’re not perjured if the details aren’t 100% accurate. But try to recall. If you don’t remember what you did for that situation, tell me in that case what was commonplace behavior.Stay Positive  All businesses are loosely functioning disasters.  — Brent BeshoreI hire positive change agents. Yes, I asked you to tell me about a time you worked with a difficult coworker or boss.Yes, they may have been intolerable. Organizations are messy places. We’re not there to solve easy problems. Do you work to make things better, constructively?It’s not that hard.9 times out of 10 when someone says:  I don’t want to speak poorly of my past employer.I know the next word out of their mouth is going to be…  ButStay positive. If this is hard for you, consider changing this single thought pattern in life.Take OwnershipRemember that question about the difficult coworker? Did you make an effort to make it work?No? Ok.Did you reflect on that and wish you had behaved differently? Yes? Great!This is your chance to tell me what you did and what you wish you had done differently. This is the one time I want to hear hypotheticals.  One co-worker in particular I worked with early in my career was incredibly difficult. I honestly didn’t have the crucial conversations with them that I wish I had. I ended up quitting. I haven’t encountered anyone as challenging for me as that since then. But I have a few cases where I was encountering friction with a co-worker. I remembered where I fell down and decided to have an uncomfortable conversation. Can I share that with you?Yes. Yes. Yes. Please do! (Can you tell I’m excited?)That’s it:  Tell a Story  Stay Positive  Take OwnershipThese are three simple principles to follow.In practice these are hard to internalize and apply. Behavioral interviews reflect people’s behaviors as well as their perceptions. Powerful things to change. So I’m not worried about folks gaming the system.I hope this post helps even a few people better represent their experiences, interview better, and land in great organizations.",
        "url": "/essays//2021/07/26/behavioral-interviews-made-simple.html"
      }
      ,
    
      "2021-05-15-ratcheting-effect-html": {
        "title": "A Ratcheting Effect",
        "tags": "",
        "date": "May 15, 2021",
        "author": "",
        "category": "",
        "content": "This post was derived from a message I delivered at a regular company all hands meeting after I let an employee go due to under performance.As a company focused on fostering trust between organizations and their customers, a core part of DataGrail’s m.o. revolves around transparency both within and without.I was asked to say a few words at the meeting about the circumstances surrounding this departure. It was a humbling experience because I wanted to honor the employee while being transparent and true to the circumstances. Here’s what I said.Thanks, Daniel. Lee’s (not their real name) last full day with the company was on Thursday.I want to say two things about this departure.First, Daniel has made the analogy before that the demands of a startup of DataGrail’s stage and trajectory are akin in many ways to being a professional athlete.We are in an intense period and the expectations for everyone in an organization like this are incredibly high. Maintaining our current trajectory means that they will only increase.These demands may not be for everyone across every season of life. If that’s true for someone we’re interviewing or someone who exits the organization, it’s not an indictment of their character, their intelligence, or them as a person.There was simply an impedance mismatch between our stage as an organization and their stage.We desire to be a high performing organization. As we go, there’s a ratcheting effect to our talent and the expectations for each of us.Second, this was not a sudden event.The idea of “win as a team” is incredibly pertinent here. We don’t trade people off the team for a missed play, a bum game, or even a poor season here at DataGrail. We rally around them and attempt to support them.If over a period of multiple seasons we’re still not seeing the contributions that are fair to the whole team, only then do we move toward what we might describe as formal performance management.We “win as a team” and have “empathy always”.",
        "url": "/essays//2021/05/15/ratcheting-effect.html"
      }
      ,
    
      "2021-04-25-fossil-record-html": {
        "title": "A Gap in My Fossil Record",
        "tags": "",
        "date": "April 25, 2021",
        "author": "",
        "category": "",
        "content": "I joined Duo Security in early 2015. At the time we were just shy of 100 employees and had around 20 engineers. We had &lt;$10M ARR. We were late in our series B financing and just about to raise series C.In the 5.5 years to follow I would be a part of Duo’s growth to 800+ employees, over 100 engineers, a $2.35B acquisition by Cisco, and $300M+ ARR.In 2015, we tripled revenue. Then we doubled it again and again and nearly again.I got to see firsthand how Duo’s leadership steered the company through an unrelenting pace of change. I ran and invented many plays myself along the way as I led teams doing things neither I nor anyone else around me had experienced before.Most days it felt a bit like going too fast down a hill on your bike. The handlebars are wobbling despite your white knuckles with control just out of reach.In retrospect, it was exhilirating. In the moment, it was exhausting and terrifying.I joined DataGrail in late 2020. We were and still are earlier in our journey than Duo was when I joined. We had 40 employees and just 7 engineers. We were earlier in the T2D3 model. We were late series A and now are series B.Many days I feel a bit uncomfortable. Not discomfort like growing from 100 to 200 or 200 to 400 people or starting 3 product lines in a year. I know what over there at Duo’s stage should generally feel like. Rather, the discomfort is not yet knowing the course to chart to get there.In short, I have a gap in my fossil records.My job over the next 18 to 24 months is to nudge us–my team, the company, myself–bit by bit closer to there.Then my job is to bring to bear my 5+ years of experience under incredible growth to do it again at DataGrail.Mind the (fossil) gap. 🦕",
        "url": "/essays//2021/04/25/fossil-record.html"
      }
      ,
    
      "2021-04-23-funding-rounds-html": {
        "title": "What Funding Rounds Buy You",
        "tags": "",
        "date": "April 23, 2021",
        "author": "",
        "category": "",
        "content": "As I’ve been recruiting, onboarding, and coaching lately within DataGrail, I frequently touch on the topic of the company’s stage.Folks make observations or have questions about where we are, where we’re going, problems we’re encountering, and what the right set of trade-offs to optimize for are.One of the models that I come back to is our stage of company. I find it a useful tool to frame a larger discussion about what we’re working toward at this moment as a company.It uses fundraising rounds as a lens for the problems that a company is focused on. What does each of these rounds buy an investor and focus the compnay on?n.b. this model biases toward B2B SaaS companies.SeedYou’re paying for the company (really the founders at this point) to find a market problem that people are willing to spend money to have solved.You’re discovering what the job to be done is.Usually this involves building an alpha or POC version of a product.Shortcuts are taken on the path to validating that this is a worthy problem.Series AYou’ve proven that your problem matters to people.Now the goal is to build a product that you can sell repeatedly.Again, perfection is not the goal; iterating quickly is. By the end of A, if you’ve done it right, you’ve built yourself a product with market fit.Series CBefore we move on to series B, it’s useful to first jump to C. By the time you arrive at a C round, you should have a repeatable go-to-market motion. You should have playbooks. You should have an excellent product that can take off without the company collapsing under the weight of its own success.We’re about to hit the steep part of the hockey stick and the money from this round buys you gasoline to pour on the 🔥. Building out a robust salesforce, hiring engineers to expand product surface area rapidly, pursuing new channels and verticals.Let’s go.Series BSo if A is about hitting the groove of product-market fit and C is about pouring gasoline on the fire, B is about tuning the engine of the company.The goal here is to build a strong, repeatable GTM engine and a robust product that requires sublinear human effort to grow in usage.In other words, engineer the business.Series D and BeyondThe meaning of rounds at this point become fuzzier. D can be a mezzanine to something bigger like an IPO. For example, prove to the public markets ahead that you can acquire companies, integrate them, and grow non-organically. Or show that you can deliver on multi-year strategic plans.Series D for a company that has executed through C well though is a tee up for the big leagues.Each of these rounds is critical, but to me the first 3 are the hardest to get right.The plumb line moving from seed to A and A to B and B to C needs to be true. Small misalignments compound and become much costlier the further you go.So nail the purpose of the round when executing and you’ll have better problems to focus on. 📈",
        "url": "/essays//2021/04/23/funding-rounds.html"
      }
      ,
    
      "2021-01-25-the-religion-of-agile-html": {
        "title": "The Religion of Agile",
        "tags": "",
        "date": "January 25, 2021",
        "author": "",
        "category": "",
        "content": "  Individuals and interactions over processes and tools  – 1st Principle of the Agile ManifestoI’m regularly asked by candidates when conducting interviews something along the lines of “Are you all an Agile shop?” or “What Agile methodologies do you all follow?”These candidates are typically looking to hear what elements we’ve adopted of scrum, kanban, or XP. Do we estimate? Do we have a product owner? Do we use Jira?The profound irony to me of this line of questions is that it is completely antithetical to the Agile Manifesto, in particular the first principle: individuals and interactions over processes and tools.I call this line of thinking big-A Agile. It’s a type of religion of the by-products that evolved to serve the manifesto. But we’ve forgotten the master they serve.When asking about big-A Agile, the candidates are literally asking what processes we follow.The fact that we’ve arrived here isn’t suprising to me, but it does reveal an amnesia in what led the forefathers of agile to its roots to begin with.There are entire cottage industries of consultants, certifications, tools, and books that teach “agile methodologies”. They’ll show you the “right” way of being Agile.Now, I’m not against any one of these practices. However, if adopted what needs to be relgiously adhered to is not the process or tool itself, it’s the people and principles of the manifesto.When I lead engineering teams, I don’t mandate that we perform story pointing or planning poker. If the team finds value in it, great; I will gladly help facilitate this activity. The value I’ve seen teams derive from estimation though is that it is a forcing function for a conversation. That’s it.  You think that will take X, and I think it’ll take Y. Tell me more!or  Hey, the team’s velocity won’t allow for all of this work. What are we willing to trade off?If these discussions are occuring without the tool, then why change it?The reason that I feel so strongly about this is because I have been part of teams that followed scrum and XP practices to a T.We were efficient.But we were not effective.We were doing the work right but we were not doing the right work.Agile hardliners will argue that’s because we were missing some key ceremony or role to protect against this.It’s not that complicated though.We forgot that we were people who needed to interact to create working software that served our customers’ changing needs.Losing the essence of something in the pursuit of religion is nothing new.  The Sabbath was made for man, not man for the Sabbath.  – Mark 2:27",
        "url": "/essays//2021/01/25/the-religion-of-agile.html"
      }
      ,
    
      "2021-01-16-assessing-performance-html": {
        "title": "Assessing Sales and Engineering Performance",
        "tags": "",
        "date": "January 16, 2021",
        "author": "",
        "category": "",
        "content": "Sales is the relational profession: drip campaigns, nurturing leads, touchpoints, making tee time, maintaining the rolodex. (Don’t confuse the soft-skill activities here to mean easy; from what I’ve observed it’s anything but.)Engineering is applied science: proofs and theorems, instrumentation, algorithms, bits, and bytes.And yet, there’s a certain objectivity available in assessing sales professional performance that isn’t available when it comes to software engineers. The sales leader has an easier time qualitatively navigating performance conservations than the engineering leader.  Account Development Representative: Did you meet quota on booked meetings?  Account Executive: Did you meet quota on new deals?  Account Manager: Did you meet quota on expansions?A sales professional who meets their number quarter after quarter and embodies the team’s values gets to keep playing. If you miss quota too frequently or meet quota but run over others in the process (depending on the org), you’re gone.As a manager, it’s a pretty simple rubric to assess performance and decide to act.How do I decide as an engineering leader that someone isn’t performing? Being late on an estimate? Shipping a bug? Not performing enough code review? Being too pedantic in code review? Not knowing how to present your architecture for buy-in?The most drastically deficient cases are easy (e.g. code is habitually late and broken when posted for review, an engineer never takes time to review other’s code.)There are also engineers who are predictable and steady and who are easy to evalaute. They ship code on-time with few bugs, perform thoughtful reviews, and deliver what was asked. However, if they’re that consistent, then as a leader we’re probably not asking these engineers to tackle the hairy, ambiguous problems. They play an important part on the team, yet the advances they make for the team and company are incremental not revolutionary.There’s a third case though. What about the engineer who you give the hardest problems to? They sometimes come up short. They sometimes make mistakes, ones that are obvious in retrospect. They’re also pushed harder project after project because the organization asks more of them.How do you evaluate their performance? How do you justify this to your own leaders? What if those leaders don’t have a product development background themselves?And of course software engineering is a team sport. So disambiguating the effects and dynamics of a team on an individual’s performance makes this all the harder.At this point in our industry, it’s impossible to objectively and qualitatively measure a single engineer’s performance. Engineering leaders are paid to bring to bear their professional experience and judgement to assess and steer both the team’s and individuals’ performance. Management is fundamentally about applying subjective assessment to ambiguous situations. Software engineer performance is no exception.",
        "url": "/essays//2021/01/16/assessing-performance.html"
      }
      ,
    
      "2020-12-14-on-estimates-html": {
        "title": "On Estimates",
        "tags": "",
        "date": "December 14, 2020",
        "author": "",
        "category": "",
        "content": "  …current programming practice is closer to novel writing than it is to engineering. The novelists are bound only by their imaginations, which is somewhat as the programmers are when they are writing software. Both activities have a large creative component, and while you would like to make programming resemble engineering, it will take a lot to make programming resemble engineering, it will take a lot of time to get there–and maybe you really, in the long run, do not want to do it! Maybe it just sounds good.  — Richard Hamming, The Art of Doing Science and EngineeringOne of the challenges software engineers and engineering leaders face is that of providing estimates.  How long will $X take?Sounds simple. It’s often anything but, especially for any $X that will take more than a few hours.In many ways, we’ve done ourselves a disservice by naming our discipline software engineering. I don’t know for certain, but I’d wager that when a civil engineer goes to design a bridge, they follow a pretty standard process. The number of ways for building a bridge is not just finite, but charted. Type? Suspension. Ok, we have five options. How many cars? $Y per hour. Ok, we have two options. Etc.Software engineering though is more art than science. It’s fundamentally a creative endeavor. And this bit is hard to convey, especially to those who haven’t done it.How can it be a creative endeavor? It’s got engineering right in the name?How can you not tell me how long it will take to add a button to do $Z? Two weeks? I’m not asking for you to design a car (something that takes many years by the way).How do you capture and convey this dilemna to those who haven’t experienced it?Maybe it’s like asking an artist how long it will take to make an installation. If you want it faster, it won’t be as good. Quality art takes time. This video drives the point home.But even that doesn’t do the issue justice for software engineers. There are two more variables at play.First, we’re often being asked to build on top of something that already exists. Maybe the engineer is fortunate enough to have prior experience with that system or codebase. Regardless, whatever was built before certainly required time constraints and tradeoffs.Second, we’re being asked to build something that may very well be built on in the future, but we don’t know exactly how it will be used or extended. So, we build with assumptions and with imperfect knowledge of the trade-offs to come on top of something that was built with assumptions and with imperfect knowledge of the trade-offs to come.Neither of those points are exactly unlike other engineering disciplines. But I think the radical things that software engineers are asked to add to their systems are much more radical than other disciplines.A building might be a candidate for an expansion. But what if the building was a skyscraper and we want to add a pool? What if the pool has to be on the top floor? What if it has to cantilever over the top with a see through bottom and support 500 people?Now we’re starting to see the challenge. The building would have had fundamentally different design assumptions if we knew this was a use case we wanted to support when we were originally building it. We may be able to make the modifications to allow for this change, but it could take a long time and be expensive.Similarly, changes to a car model are often incremental. Maybe a redesign happens, but if it’s radical enough then it starts from scratch and requires new ways of doing things. These new ways require inventing technology and methods that don’t exist. How long will that invention take? Just have the engineers think harder I guess.Often extensions to software systems take the product in unforeseen directions. This is part of discovering product market fit, of coming to better understand what problems are worth solving for users, etc.Altogether software engineering suffers from the problems of many “right” ways of doing something combined with building on a system that was never designed with the new use case in mind.These properties make it a creative endeavor.And so estimating is difficult.h/t to my former colleague Glenn Stempeck for the pool analogy; he also wrote this excellent essay on the perils of splitting a team’s focus.",
        "url": "/essays//2020/12/14/on-estimates.html"
      }
      ,
    
      "2020-11-18-organizational-orthodontia-html": {
        "title": "Organizational Orthodontia",
        "tags": "",
        "date": "November 18, 2020",
        "author": "",
        "category": "",
        "content": "Not all organizational change requires swift action. In fact, most doesn’t. And to apply it would be wrong.Instead, it’s better to think of organizational change like orthodontia.Sometimes the teeth need a lot of help. But it’s the rare case where the orthodontist or oral surgeon has to break the jaw and plate the bones.Instead, orthodontia is a game of constant, steady pressure over time. Patience.Come back for regular adjustments. Soon you’ll have the braces removed and a perfect smile underneath.(Then you have to retain that result nightly for the rest of your life.)When you begin of course, the future state seems too far off to ever be a reality.There are cases where an organization needs swift action (e.g. a concise termination).In most cases though, organizational change requires patient, steady pressure.Have a nasty habit of oral tradition or Slack essays to share knowledge?Nudge the team to document their knowledge in the wiki.Again.And again.And again.  The team is going to grow by 3x in 12 months. You won’t want to explain every one of these concepts 25 times.Slowly. Very slowly. It starts to click into place.One day a new employee has a question. And someone replies to that question with a wiki link. A link that contains the answer. An answer that would have been rehashed in Slack. Now that person knows knowledge transfers here through the wiki not oral tradition.😁 Smile.",
        "url": "/essays//2020/11/18/organizational-orthodontia.html"
      }
      ,
    
      "2020-10-16-the-duality-of-management-html": {
        "title": "The Duality of Man(agement)",
        "tags": "",
        "date": "October 16, 2020",
        "author": "",
        "category": "",
        "content": "  Poge Colonel: You write “Born to Kill” on your helmet and you wear a peace button. What’s that supposed to be, some kind of sick joke?…  Private Joker: I think I was trying to suggest something about the duality of man, sir.  Poge Colonel: The what?  Private Joker: The duality of man. The Jungian thing, sir.  Poge Colonel: Whose side are you on, son?  Private Joker: Our side, sir.  – Full Metal JacketManagement requires dichotomous thinking: holding two opposing ideas or branching paths in one’s head at a given time.Each is a legitimate possibility.They may not be equally weighted in terms of likelihood.And you may desire for one to occur over another.But each is a distinct possibility.  You’re hiring for an open position. Candidate $X is advancing nicely. You have high hopes for them. You’ve built rapport with them. You can visualize how they’ll benefit and complement the team. And yet, you can’t let up on interviewing other candidates, sourcing new ones, generating additional pipeline. You may even meet candidate $Y. $Y could be excellent too. Maybe better than $X…  You’ve come to recognize that $Z is not meeting expectations for their role. You need to start being more explicit both in your feedback to them about specific issues and generally about their overall performance. You simultaneously want $Z to raise their performance, to meet and exceed your expectations. You also need to be prepared that $Z may not be able to do so. $Z deserves an equitable chance to succeed. The team you manage also deserves to have contributions commensurate with folks’ positions…  Your company is preparing to IPO, to make an entrance into the public markets. The board is built out, the C-suite is filled, appropriate financial reporting is in place, the roadshow is ready. And yet an interesting potential acquirer is asking for a meeting. You think there may be a good fit and better together may be…Responsible management requires holding both ideas in the mind’s eye simultaneously.The muscle to build here is recognizing whether you are in a situation that requires considering two (or more) potential outcomes.Is a single “good enough” solution ok?Or is this the management equivalent of speculative execution in processors?If the latter, then your actions shouldn’t lead to pruned possibilities too soon.Choose wisely.",
        "url": "/essays//2020/10/16/the-duality-of-management.html"
      }
      ,
    
      "2020-10-10-preconditions-of-management-html": {
        "title": "Preconditions of People Management",
        "tags": "",
        "date": "October 10, 2020",
        "author": "",
        "category": "",
        "content": "Career discussions with engineers invariably hit upon the topic of “management” at some point.There’s a lot to unpack when these come up, but as a foundation for thinking about and discussing it, I usually start with the following framework or mental model.The preconditions for someone moving into people management are threefold.In order for an engineer to become a manager, there must be:  Opportunity / Need  Interest  AptitudeOpportunity / NeedThis is pretty straightforward. If a 6-person engineering team has a manager and isn’t planning on growing in the next year, there really isn’t an opportunity or need for another manager on the team.InterestSimilarly, if there’s a need for a manager but if no one is interested in the role, then no one on the existing team is going to make the transformation, even if they might be suited for it.AptitudeSometimes there’s both need and interest by someone looking to move into people leadership. This is where things may get a bit messy.The last and equally critical piece of the puzzle is aptitude. Can the person do the job? I have a few determinants here.First, are they effective in their current role? If they’re undependable as an engineer, can’t execute on projects, have trouble being an effective executive of their time, etc. why would I put them in a role that is even more demanding in those same avenues?Second, managers must create clarity and determine what’s next often with little direction. They drive results for their team and set the pace.I apply the following acid test as a starting place for assessing this form of aptitude.An individual contributor says they’re interested in management. We discuss motivations, differences in the role, etc. Then, I typically recommend a number of follow-up ideas or resources for them to learn about managmeent.For example, I might suggest they set up a 1:1 with the VP of Engineering at the organization or talk to $X who made a similar switch just 12 months ago. Or go and read Radical Candor or listen to the Manager Tools “Basics” series. I tell them to let me know when they’ve had a chance to do some of those things. I then let the discussion sit for a while.Some never bring it up again.Others, come back months later and restart the conversation.  IC: Hey, what ever happened with that manager role we were going to need?  Me: Glad you brought it up! Did you have a chance to listen to those podcasts or read those books or talk with those people? I’d love to hear your thoughts. No? Oh. Ok. Let’s talk about what fell off there…There’s a last group though that hears the suggestions and goes and does them. They come back a week later and want to talk about some aspect of the latest podcast episode they just listened to. Or I hear from the VPE that they had a great conversation with the person.It’s this last group who has the aptitude for management.The same quality in that person that took a small suggestion and followed up on it will mean they are 10x more likely to make their team successful.A stakeholder on a project isn’t being responsive for an engineer. Will the manager throw their hands up and just say “I’m not sure what to do?” or will they figure out how to create clarity?If you have a need for new managers in your organization, I strongly believe that promoting managers from within is one of the best things you can do. Look for folks who are interested in the role and demonstrate the aptitude and drive to be successful.These three aspects are a sort of Proterozoic soup out of which an engineer can evolve into a manager.",
        "url": "/essays//2020/10/10/preconditions-of-management.html"
      }
      ,
    
      "2020-10-04-python-datetimes-html": {
        "title": "DevOops with Python Datetimes",
        "tags": "",
        "date": "October 4, 2020",
        "author": "",
        "category": "",
        "content": "Let me tell you about the time we dropped all the data we had in a production Elasticsearch cluster just days before cutting over to it for a huge feature release.I previously alluded to the pain of trading off the strengths and weaknesses of MySQL with those of Elasticsearch.If terms like document and index are lost on your in the context of Elasticsearch, here’s a high-level overview.One of the challenges we encountered was cluster maintenance. Elasticsearch is best not left to grow unbounded. So we made a decision to cap data retention in our system at 180 days.We wrote a Python process that would run regularly and check whether data needed to be purged. In Elasticsearch, it would have been more expensive to query and delete every single document that was older than 180 days. Instead, we decided to drop indexes that were older than this time period.But of course, it wasn’t that simple. For most of our clusters, we stored our data in monthly indexes. This meant that every authentication that took place in December 2019 was stored in an auths-monthly-2019-12 index. On a few of our larger clusters at the time, we kept data in weekly indexes.In order to do this, the process we wrote had to parse the index name and convert a portion of the name to a date. If it was older than 180 days, we could drop it.Not really though. We had to add a bit of extra logic. If it’s June 15th and we’re evaluating whether to drop an index, we have to ask ourselves what the youngest data in the index is. So if it’s an index for December 2019, we have to check whether data from December 31st is old enough to drop.Let’s see how this looks in practice.If the index name was auths-daily-2016-06-06, then we’d parse 2016-06-06 to a date. If that date was older than 180 days from today, we could drop the index.&gt;&gt;&gt; datetime.strptime('2016-06-06','%Y-%m-%d').date()datetime.date(2016, 6, 6)We kept daily indexes in local development, but otherwise, this wasn’t a huge use case. Our retention code worked as expected.We did keep monthly indexes though. So auths-monthly-2016-06 was parsed like below.&gt;&gt;&gt; datetime.strptime('2016-06','%Y-%m').date()datetime.date(2016, 6, 1)Puurrrfect. Data retention working as expected.Like I mentioned, a few of our large clusters had weekly indexes. Let’s parse auths-weekly-2016-26.&gt;&gt;&gt; datetime.strptime('2016-26','%Y-%W').date()datetime.date(2016, 1, 1)Wat? January 1, 2016 for the 26th week of the year.The first time that we ran our data retention code against a weekly index was…in production…when we turned the retention process on…against our largest cluster…days before preparing to go live with a huge feature release that depended on the ES data.Don’t worry, we recovered it rather quickly.It turns out you need to include a day of the week.&gt;&gt;&gt; datetime.strptime('2016-26-0','%Y-%W-%w').date()datetime.date(2016, 7, 3)Why the 0th day of the week gives you a date that’s older than the 1st day of the week is another matter altogether.What’s the moral of this story?First, it’s just a (now) fun war story (or bit of scar tissue or wisdom of production lesson) that I wanted to share.Second, it illustrates the difficulty of eliminating bugs in software. Now the TDD folks will say that unit tests would have caught this.We did have unit tests.We didn’t have ones to test weekly index parsing though.Even if we had written those tests, the developer may just have easily have written the test to check that auth-weekly-2016-0 returned January, 1, 2016. And it would have.This still wouldn’t have uncovered the unexpected behavior.TDD diehards may say we should have written 2 unit tests per unit of time we were parsing!Fine.However, the nature of a startup is that it defaults to death. When things start, the only thing that matters is shipping code, getting product into customer hands. As time goes on, protecting existing revenue may become more important. Customers come to expect the same level of quality in your new features as they do in your rock solid existing product.I hesitate to conclude that there’s not a lesson to be learned here. I’m sure there is. I just don’t think it’s necessarily satisfying to most.Bugs happen. We’ll fix them when they do. At least I know a bit more about Python’s datetime internals now.",
        "url": "/essays//2020/10/04/python-datetimes.html"
      }
      ,
    
      "2020-10-02-the-right-fallacy-html": {
        "title": "The &quot;Right&quot; Choice",
        "tags": "",
        "date": "October 2, 2020",
        "author": "",
        "category": "",
        "content": "In business decision-making, there’s rarely a clear, right choice.There are usually some objectively wrong or bad choices.There are often several good or fine choices.This is good news!Is a relational database better than a no-SQL database? It depends.This particular example hit the whole point of this essay home for me several years ago at Duo. We were moving away from MySQL to store records of authentications. After growing a table to several billion records and continuing to add hundreds of millions more per month, making changes to the schema was onerous and caused outages. Further, it was nearly impossible for us to flexibly search, filter, and aggregate the data (a problematic outcome when we had customers screaming for robust reports to demonstrate how Duo was performing for them). We chose to move to Elasticsearch. What it made up for in the benefits of flexible schema, searching, and aggregation, we felt the tradeoff of cluster maintenance and a lack of relational data capabilities.Most decisions are not about picking the right choice but rather being aware of the appropriate tradeoffs.Org design decisions are no different. There is no best org design.Are teams of full-stack developers focused on a single product better than teams of specialists? It depends.What tradeoffs do you want to make? Neither is problem free so you’re really making a design decision about how you want to operate going forward. As Churchill said, “…we shape our buildings and afterwards our buildings shape us.”Academically, it’s easy to see that there being a single, right choice is often not the right issue to focus on. Economists figured this out long ago. Vilfredo Pareto developed the idea of Pareto Optimality or Pareto Efficiency.In the economists’ model, it’s straightforward to chart the pareto curve and the options that are all optimum. It’s easily quantifiable.Practical application is more difficult though.Developers desire clearcut answers. However, software engineering is more art than science. The name belies how subjective the field is. Can you really quantify the benefits of Rust over Python? I doubt it (although someone invariably has or will try).Luckily though, most decisions don’t need an optimal choice. They just need a good enough one. Pareto figured this out too. 80% of the effects come from 20% of the causes.Stop asking if something is the right choice. Instead, ask if it’s a reasonable, good enough choice. Make the decision. Then move on.",
        "url": "/essays//2020/10/02/the-right-fallacy.html"
      }
      ,
    
      "2020-09-19-builds-feedback-for-high-performers-html": {
        "title": "Builds, Feedback for High-Performers",
        "tags": "",
        "date": "September 19, 2020",
        "author": "",
        "category": "",
        "content": "When managing high-performers, I’ve generally seen a bimodal distribution in the type of critical feedback that I give.One the one hand, high-performers, almost definitionally, are sticking their necks out, pushing the organization forward, and challenging where the team and they themselves are at.People who stick their necks out are most likely to receive a haircut when things go wrong. It’s easy to give a high-performer feedback in those circumstances. They’re not perfect and it’s obvious what their flaws and mistakes are. We’re pushing the boundaries of what we as an organization and they as a professional have done before.On the other hand, I’ve seen where a high-performer goes through long periods of projects that are important but not necessarily critical to the organization. The margin for error is wider and the likelihood of making mistakes, or at the least others being impacted by them, if much lower.I can go months on end during these times where I feel like I have nothing material to discuss in a 1:1. The direct may even ask, “What feedback do you have for me?” (as high-performers are apt to do). This feels, and arguably is, a management failure.Funnily enough, I was discussing this dilemna with a manager who was a direct report of mine after they asked the very question above. I explained my guilt and failure after saying, “Keep doing what you’re doing.” Their personal solution as a manager to this problem removed the proverbial scales from my eyes.This manager talked about how they sometimes thought of critical feedback for high-performers not so much as what they were doing wrong but what more they could do. They referred to it as a build.It’s not dissimilar to the Airbnb model I discuss here.The feedback goes a bit like this.  Hey, that presentation you gave was good. You got your points across, drove a decision, and folks got clarity on what was needed. Here’s what you did well…It was a 7/10. Here’s how you could make it a 9/10…or  Excellent delivery of leading the project. Next time, consider $X and $Y to perfect it.The purpose of all feedback is for a direct report to know how they can improve.  What should they continue doing?  What should they stop doing?  What should they do differently?The first two are typically where positive and critical feedback hit. The build hits the last question. Not because what they’re doing right now is bad, but because it could be better. And that’s what you should want them to be.In the periods of regular, predictable projects, this is the area to focus the most on growing your team.",
        "url": "/essays//2020/09/19/builds-feedback-for-high-performers.html"
      }
      ,
    
      "2020-09-11-problem-solving-maturity-model-html": {
        "title": "Problem Solving Maturity Model",
        "tags": "",
        "date": "September 11, 2020",
        "author": "",
        "category": "",
        "content": "  The first rule is if you see a snake, don’t call committees, don’t call your buddies, don’t form a team, don’t get a meeting together, just kill the snake.  – Jim Barksdale, Former President and CEO of NetscapeI have a mental model I call my Problem Solving Maturity Model. It goes like this.At the lowest end of the maturity model are direct reports who complain about issues, particularly unconstructively. “This sucks” or “that’s stupid” are the most obtuse forms of this, but just pointing out problems is a less pernicious manifestation as well.Folks on the mature end of the model solve problems, often by the time I’m hearing about it. These folks are high performers. There’s a bit of danger here in solving problems without talking to others. But folks who can judge when to just solve the problem without asking are really dialed into the organization’s needs. It’s ok to ask before solving, in particular if you’re new to an organization and trying to figure out the API or if the solution is expensive or political.The point though is that solving problems » finding problems. The latter is necessary but not sufficient.So here’s the maturity model:  “This is a problem” or “This is dumb”  “This is a problem; here’s what we should do about it…” (notice the use of the ambiguous we)  “This is a problem; here’s how I’m planning on fixing it…let me know if you have feedback”  “This was a problem; I already fixed it.”I hear pushback sometimes that a direct report may not know how to fix a problem and so it’s not fair to ding them. A few thoughts there.First, I’m more willing to accept this the earlier someone is in their career. They may not know how to navigate the org or they may not have developed the professional muscles to realize that they should bring solutions. That’s a coaching moment; don’t waste it.Second, I could see a case for more senior people being handed more intractable problems. My rebuttal to this though is that the more senior you are, the more that your role is about solving intractable problems. The Secretary of State doesn’t just get to hand off their intractable issues to the President. They are hired to solve exactly those issues!I might refine this argument by saying that the more removed a problem is from someone’s role, the more tolerance I have for someone not coming with solutions. That being said, I still believe that it’s a sign of professional maturity for someone to clearly articulate the problem and be clear that they’re at a loss for how to solve it. A mid-level engineer may see dysfunction (that’s affecting them) with some HR-related process and not know how to solve it. But if it’s a problem related to form-validation in the core product where they work, I don’t want to hear complaints without plans.Just kill the 🐍.",
        "url": "/essays//2020/09/11/problem-solving-maturity-model.html"
      }
      ,
    
      "2020-09-04-safe-browsing-html": {
        "title": "Safe Browsing",
        "tags": "",
        "date": "September 4, 2020",
        "author": "",
        "category": "",
        "content": "BackgroundOne of the first responsibilities I had as I became an Engineering Manager at Duo Security was the launch of a greenfield phishing product, Duo Insight.Side note, there was an internal employee poll at the time on what to name the new product. The record will show that Tackle Box was the winner. Get it? Phishing? Fishing? Tackle box? Yes, that’s what I voted for. Still a missed opportunity in my mind.Duo’s core product was centered around 2FA, which guards against stolen credentials. However, we had decided there was an opportunity to demonstrate the need for 2FA by allowing companies to phish their own employees for free. The story behind the decision to build the product is a different blog post (or three). But decide to build it we did!So let me state it like this. My team was tasked with allowing any company to send fake phishing emails to their employees that looked like Google Drive, Office 365, Salesforce, or Outlook messages linked to fake login pages in less than 5 minutes.The largest companies in tech have been working for a very long time to counter nearly every aspect of what we were doing.Blocking unwanted emails at all? Check.Blocking emails that are suspiciously similar in content and look and feel to popular services? CheckBlocking emails that use brand names but come from email addresses not associated with those brand names? CheckBlocking sites that seem suspicious? CheckStopping phishing is a problem that Fortune 100 tech companies have spent enormous amounts of money building into their products to keep users safe.So why shouldn’t a team of 5 engineers, product managers, and designers be able to launch this product? Knowing what I know now, I would never have thought we could do it. But that’s the power of naivete. It turns out that it’s trivial to send an email; getting it to show up in someone’s inbox though is pretty difficult.LaunchAnyways, we spent 12 months building this product. I took over the team as a new manager about 4 months before launch (the classic story of “There’s just a few more things remaining. Your team should be able to finish it in a sprint or two.”)We finally launch the product mid-summer and all goes smoothly at first.CrisisThen one day a Technical Support Engineer Slacks the #duo-insight channel and reports that a customer is seeing this view.That’s Chrome’s display for a site on the Google Safe Browsing list.I distinctly remember that I was in an Engineering Staff Meeting at the time when I looked down at my phone and saw the message. I got up, went back to my desk, went to the tool on my laptop, and tried it myself. Sure enough, that URL had been burnt by Safe Browsing.No problem, this is why we had multiple services and domains.I go to another site. Same story.I pull another engineer from my team out of the meeting and have them try on their laptop. Not good.Every domain and service that we had built this product around was now being flagged by Safe Browsing across every major browser.It turns out registering all of these domains as part of the same Amazon Certificate Manager cert was a bad idea. Safe Browsing grabbed all the sites on the cert and added them to their list.Worse still, the interconnected web of tools that keep the internet safe was propagating this list through itself. Soon it wasn’t just browsers that were blocking our domains. After a few more tests, any emails sent out from our tool were automatically being blocked by the most popular built-in and off-the-shelf spam defense products.I pulled our VP of Security into what was now becoming a war room. He had warned that we should proactively reach out to these groups and get their feedback before launch. He reminded me that he said this would happen. He wasn’t wrong.As a new manager though and with the pressure of hearing “this should only take a few more sprints” and then having 4 months go by, I felt we couldn’t delay launch longer. Lesson learned.Luckily, Duo had people deeply connected with the security community at nearly all major companies. I ate crow and asked these folks to reach out to their contacts at these places.Google’s reply was something like this.  So, you’re telling us that Safe Browsing is blocking a site that has a lookalike domain (e.g. drive-accounts-google-com.com) for one of our products (e.g. Google Docs) that’s being linked in phishing emails that are fake but indistinguishable from real ones and that link to a fake login page that looks like the Google sign-in page that’s using our branding and logo? Sounds like Safe Browsing is working as designed. Good luck with your little, new product though.Ok. We should have anticipated that response too.But we were trying to make the internet safer! Couldn’t they just allow our service? No.DecisionIn the midst of all this, I had sales people asking me when the site would be back up. I had marketing asking for the status because they had just launched a demand gen campaign around this. Product had ideas. Security wanted to rethink the entire product. And Duo had just invested over $1M for over a year to make this product. And it was now the web app equivalent of being bricked.I was walking from our conference room huddle to the kitchen at one point and Zack Urlocker, our COO, came up to me. I thought I was about to get a good chewing out or better yet fired. At the least I thought I was going to get an opinion. And in a way I did.  Erik, you’re getting a million opinions right now. At the end of the day though it’s you and your engineers who have to fix the problem. You make the call. You own the decisions. You can listen to everyone else but you make the call.In the depths of this crisis, as a new manager, surrounded by chaos, this is what I needed to hear.ConclusionWe eventually took a number of measures to get Duo Insight back online. Remarkably, it took just a few days. We removed the lookalike domains, had emails and login pages that were stylistically similar to the services we were phishing with but that didn’t include their logos, added explainers about how our tool did not collect passwords to the root of each domain where Safe Browsing looks, performed transparent domain registration, etc. I think in the 4 years that followed we might have had one additional domain burned. But nothing of the magnitude of the initial crisis.PostscriptIn early 2020, we shuttered Duo Insight due to lack of traction and to focus on higher-lever product development opportunities.I learned a ton about product development, market opportunity evaluation, making decisions, and leading teams during this time.I’m incredibly proud of my team for collaborating with subject matter experts at Duo and in the industry and then taking that information, owning the decision, and solving this problem.I also feel a bit better knowing that the internet is working really hard to make doing bad things even harder.",
        "url": "/essays//2020/09/04/safe-browsing.html"
      }
      ,
    
      "2020-09-01-proposing-technical-changes-html": {
        "title": "Boiling Frogs",
        "tags": "",
        "date": "September 1, 2020",
        "author": "",
        "category": "",
        "content": "You want to make a change to the organization or the team.You could reorg the team, assign new managers, and hope someone doesn’t quit.Or not. Remember, hope is not a strategy.Here’s a principle to guide organizational changes: Introduce the change before introducing the change.Or as we say in Indiana where I grew up: Boil the frog.The best team split I ever pulled off went like this.NovemberI found out my team was going to grow from 7 to 12 people in the year ahead.In my 1:1s with my team I had discussions like these over the next several months.  Good news! The company sees a lot of value in what we’re doing and wants to invest more in us. We’re going to be growing from our 7 engineers now to 12 next year! More details to come. What are your initial thoughts?December  Remember how we’re going to grow to 12 people next year? That’s too many for me to effectively manage everyone. It’s likely we’ll end up splitting the team so you can have the attention from a manager that you deserve. I don’t yet know what that split will look like or when it will occur. But I don’t want it to be a surprise for you.January  I’ve been thinking about options for our team split. Option $A has us divide based on area of product ownership. Option $B has us divide based on area of the infrastructure / architecture. I don’t yet know who will go where or which team I might manage. What are your thoughts?February  Thanks for your thoughts on those team configurations. After discussing it with team members as well as $MYBOSS and $THEIRBOSS, this is what we’re likely to do. I share all this out of transparency. Put a huge asterisk next to all of this because it could change tomorrow. I don’t expect it to, but it’s always a possibility. Do you have thoughts on which of these teams you’d prefer to be on? And why?March  Alright, we still haven’t decided who will manage which team, but this is likely to be the composition of the split. For now and the future we’re one team. Based on our hiring plan, we’ll probably split around July.April  Remember how when we hired $X they were interested in becoming a manager? It’s not fully baked yet, but I’ve been working with them over the past 4 months as we’ve discussed in other 1:1s. They’re demonstrating the necessary results and motivation for the role. I think there’s a strong chance they’ll be prepared to take over one of our teams as manager when we split. I want to start gathering feedback now though on your reactions to that, concerns, thoughts. This isn’t a one time conversation so if you think of things after our 1:1 or can better articulate them over email, that’s ok too.May  The feedback on $X has been largely positive. Assuming they continue to execute on their roadmap to manager, I think they’ll be ready to take over a team in July. Right now we’re thinking team $Y. Any thoughts? Additionally, I feel humbled by this but it looks like right now I’m being asked to hire another manager and manage them as well as $X. I know that’s a bit of a shift for the team.June  Here’s the plan. $X will start managing team $Y in July. I’ll continue to manage team $Z as well as $X while I recruit another manager for $Z.July  Ok. I want to review the team spl…Direct Report: Can we just do the split already? I’ve had some initial 1:1s with $X. I feel like we’ve been talking about this for months. Let’s just do it!My work here is done. 🐸",
        "url": "/essays//2020/09/01/proposing-technical-changes.html"
      }
      ,
    
      "2020-08-23-words-matter-html": {
        "title": "Words Matter",
        "tags": "",
        "date": "August 23, 2020",
        "author": "",
        "category": "",
        "content": "  What has happened to our conviction?Where are the limbs out on which we once walked?  – “Totally like whatever, you know?” by Taylor MaliAnother individual I worked with at Duo Security was Zack Urlocker. At the time he was COO. Zack had previously served as COO of Zendesk, an EVP at MySQL, and a VP at Borland.Side note, Zack always prounced MySQL as “My-Ess-Que-Ell”. After having asked him once he told me that’s what Monty, core author of MySQL, called it. So now that’s how I refer to it.One of the most poignant Urlocker memories I have was as part of a regular Engineering Leads meeting. He made it a point to attend regularly (I think he did enjoy the team that Chester had assembled although he also used his attendance as a high-leverage way to imbue the culture he desired). I don’t recall the exact topic but Zack was making a point and said:  If we want to be a…No, we want to be a high-performing organization…That’s it. It was in that moment that I learned two things.First, words matter. They convey conviction and meaning and power. Did we want to be a high-performing organization? Was that up for debate? The COO was making that clear. We wanted to be one. It also conveyed that he felt we weren’t yet one. We had work to do.Second, public self-correction is not only something you can do, it in and of itself speaks volumes. Take ownership in the moment for what you’re communicating. Send a message to your team and those around you.That one moment with Zack fundamentally changed how I communicate out loud. Here are a few areas I find myself publicly, self-correcting.Gender Biases  We have a candidate coming in for VP of People? When do you interview her?…That’s a gender bias. When do you interview them?  Hey! Where are you guys going?…Where are you all going?Weasel Words  We might want to fix that bug…Sorry, let me remove the weasel word. We need to fix that.  I could probably…It will be done by tomorrow.At first I thought it would be awkward to so publicly self-correct. Having seen Zack do so though and the impact it had on me, I started doing it. Funnily, it’s liberating.I can be clear about what I intended.I don’t have to correct myself through an email.I set the tone in the moment, even when I don’t get it right the first time.People notice even more because it’s not common.Words matter and they hold power.Thanks, Zack; I think you like totally may have changed how I communicate.",
        "url": "/essays//2020/08/23/words-matter.html"
      }
      ,
