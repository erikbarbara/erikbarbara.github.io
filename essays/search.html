      "2020-08-06-pull-it-forward-html": {
        "title": "Pull It Forward",
        "tags": "",
        "date": "August 6, 2020",
        "author": "",
        "category": "",
        "content": "I worked with Chester Kustarz at Duo Security. He was Head of Engineering in various roles throughout my tenure there (Director, VP, Director again after we were acquired by Cisco). Like many leaders who are cultural staples within an organization, there are stories and Chesterisms that float around Duo. Some I experienced and have retold, some I heard, and some are probably just made up. Regardless of their truth though, they are nearly all impactful in setting the tone and culture of the org.One that I return to constantly is the following, told in Chester’s words.  We were trying to kick off a project. And someone looked and saw that the people had non-overlapping calendars for the next two weeks.  So they said, “Ok. I’ll schedule it for then.”  Wrong.  I say “What does it take for us to clear the calendar for tomorrow afternoon to get it scheduled? What about tomorrow morning? What about today? What about we walk over to the whiteboard right now and kick it off? This is important.”  The point is that we have to reframe our mindset. We have to have a sense of urgency. Pull it forward.Companies don’t stop innovating because they become too big or bloated or outperformed. They become complacent. It happens to small companies too.It’s important to have a sense of urgency. In particular this is true in startups, which as Paul Graham says are often “default to death”. The only path to success is to have a sense of urgency.Reid Hoffman says it slightly differently.  You jump off a cliff and you assemble an aeroplane on the way down.The point is that time is of the essence. Even when you’ve made it to profitability, you have a unique opportunity to seize that momentum and do more or go faster.What’s powerful about the Chesterism above is that he doesn’t just say, “we need to have a sense of urgency”. His questions simultaneously model and will it into reality.Pull it forward.",
        "url": "/essays//2020/08/06/pull-it-forward.html"
      }
      ,
    
      "2020-07-25-on-shortcuts-html": {
        "title": "On Shortcuts to Becoming a Developer",
        "tags": "",
        "date": "July 25, 2020",
        "author": "",
        "category": "",
        "content": "  As [Jesus] was setting out on his journey, a man ran up and knelt before him and asked him, “Good Teacher, what must I do to inherit eternal life?” Jesus gave him the answer. The man replied, “Teacher, all these I have kept from my youth.” And Jesus, looking at him, loved him, and said to him, “You lack one thing: go, sell all that you have and give to the poor, and you will have treasure in heaven; and come, follow me.” Disheartened by the saying, he went away sorrowful, for he had great possessions.  – Mark 10:17-22 (heavily paraphrased)Occassionally I’m asked to grab coffee with folks looking to change careers and become software engineers. I’m happy to do so and enjoy the conversations!There’s usually a series of questions that come during our discussion that follow the order below:  Do I need to go back and get a bachelor’s in computer science?  Should I get a master’s?  What about bootcamps? I found one I can graduate from in just 6 months.One of the things that I love about tech is that it’s as close to a meritocracy as we can find in today’s workplace (yes, it’s far from perfect, but it’s as close as I’ve found). I’ve worked with and hired people who hold PhDs in computer science, people who have little more in the way of formal education than a high school diploma, and people well-educated in domains seemingly unrelated to computer science or software engineering altogether (e.g. music, Arabic).In my experience, software engineer performance is not due to educational background.To put a finer point on it, a computer science degree is not necessary to have a successful career in software development.What is? Sweat equity.There is no shortcut to putting in the time and effort required to enter into software engineering. Period.Folks can break into the industry via a bachelor’s in computer science. They can do it with a degree in an adjacent degree like bioinformatics or astrophysics. They can do it with a bootcamp. They can self-teach. I can name numerous, great engineers that I’ve worked with who did it each way.But each one put in the time.There’s often a point in my coffee conversations where I’m breaking this news to someone. And our discussion is certainly incomparable to the eternal stakes Jesus is dealing with. But I feel just a bit like I’m talking with the rich, young ruler in some of these conversations. I’m about to say something they don’t want to hear. “Yeah, yeah, yeah, I hear you, I like this, I don’t have to go back to school. This is good.” For some people, their ears tune me out thereafter.They tune me out when I say that the reason that a bachelor’s or master’s or adjacent degree works is because these people have spent years of their lives studying the fundamentals. An undergraduate degree in computer science is 4 (+/- 1) years of a forcing function for putting in the time and getting good at one thing: programming principles.And those principles are what you need to get your first job in the business.One software engineer I worked with is incredibly talented and did not study computer science. She studied economics. She took a few CS classes too late in her undergrad to want to change. So she took a technical support job out of undergrad and studied at night for hours overs years. And that effort allowed her to move within that same company into an entry-level engineering role. And then that experience allowed her to get the next job. Which allowed her to gain new experiences…repeat.But there was no shortcut for the time and effort she put in.Sweat. Equity.  Read five hundred pages like this every day. That’s how knowledge works. It builds up, like compound interest. All of you can do it, but I guarantee not many of you will do it.  – Warren Buffet",
        "url": "/essays//2020/07/25/on-shortcuts.html"
      }
      ,
    
      "2020-07-17-welcome-kits-html": {
        "title": "Welcome Kits",
        "tags": "",
        "date": "July 17, 2020",
        "author": "",
        "category": "",
        "content": "  We basically took one part of our product and we extrapolated: what would a five-star experience be. Then we went crazy. So a one-, two-, or three-star experience is, you get to your Airbnb and no one’s there. You knock on the door. They don’t open. That’s a one star. Maybe it’s a three star if they don’t open, you have to wait 20 minutes…  So a five-star experience is you knock on the door, they open the door, they let you in. Great. That’s not a big deal. You’re not going tell every friend about it. You might say, “I used Airbnb. It worked.”  What’s a seven-star experience? You knock on the door. Reid Hoffman opens. Get in. “Welcome. Here’s my full kitchen. I know you like surfing. There’s a surfboard waiting for you. I’ve booked lessons for you. It’s going to be an amazing experience. By the way, here’s my car. You can use my car. And I also want to surprise you. There’s this best restaurant in the city of San Francisco. I got you a table there.” And you’re like, “Whoa. This is way beyond.”  — Brian Chesky, CEO of Airbnb, on Masters of ScaleI think about the above quote a lot. It applies to many things we do in companies. It helps answer the questions “What does excellence look like?” as well as “How do design for excellence?”I like the exercise in particular because it’s easy to settle for average. As Brian explains, there’s magic in describing the ideal. After discussing 11 stars, all of a sudden 5 stars doesn’t seem so unreasonable to hit.Welcoming new employees to your organization is an excellent use case of this. Hiring is expensive. Further, we hire because we desire employees make an impact and return the investment of training them up. It often takes at least 3 months to really start seeing a productivity bump from new knowledge workers. It takes about 6 months to overcome the impostor syndrome many new employees face.At least one study indicates that employees decide in their first six months whether they are going to make their home at their new company.So why not invest in helping them confirm their decision even before they start? There are sure to be hiccups in their first 6 months. By welcoming and onboarding employees appropriately, you can buy yourself some grace to cover over these problems and continue the goodwill.Which brings us to the exercise of rating a welcome experience.What’s a One Star Experience? ★You only have contact with a recruiter outside your interviews. You sign the papers and are sent a tepid “Congratulations, now fill out this background check” from from the HR rep. Your manager doesn’t reach out. No one tells you where to go on day one; you have to ask yourself. They don’t have your laptop ready for several days. It seems as if you starting is mostly an inconvenience to your manager as they try to squeeze you in between meetings. No one invites you to lunch. It’s going to take 2 weeks to even get your dev environment set up.What’s a three star experience? ★★★You interview with an engaged recruiter. You sign the papers and get a welcome from your new boss. You’re told where to show up on your first day and maybe given an agenda. Your laptop is present and being formatted by IT. Your manager has scheduled some time with you.What’s a ten star experience? ★★★★★★★★★★Before we discuss what five stars looks like, let’s imagine perfection.Your hiring manager was engaged the entire time through the recruiting process. You built rapport with them even before you started. The day you signed your offer letter, a flood of welcome emails poured in from the entire company, including from the CEO who remarks on a non-generic, specific detail that you discussed in your interviews. The hiring manager called you and said they were excited for you to start. Two days later, a welcome package arrives on your porch. Let’s say you’re working at a genomics company. Inside are 23andMe kits for you and your entire family, a genetic testing kit for your dog, a DNA model for your middle school child, a plush toy for your toddler, a $500 Visa gift card just to pamper yourself, a handwritten note from your manager, books on your new domain area as well as ones that the CEO often references on the culture they’re building towards, and handmade candy from where the company is headquartered. On your first day, which you’re well prepped for, you arrive to a configured laptop with code checked out and the core software installed. You open your inbox and see your manager has blocked several touchpoints with you. They’ve built out a 30/60/90 day plan; it’s reasonable too and already defeats impostor syndrome. Your first coding task is assigned, totally doable, and you’ve got a few hours to settle in and even focus on that after your officemate has given you a tour of the kitchen area and you’ve picked up a cup of coffee. You land your first commit, people give you kudos on your pull request. Just in time for lunch with a few people from your team, not too many though. You come back, sync with your manager, they’ve outlined the next few days of work…Woah! I recognize that may not be everyone’s ten star experience. There’s a lot there to build on regardless. I feel pretty good about that experience just writing it.What’s a five star experience? ★★★★★So now, let’s dial it back to five stars. Where do we land?You built rapport with both your hiring manager and recruiter throughout the process. You’re excited about continuing that relationship, about the company, the work you’ll do, and the team you’re part of. When you sign your offer, the folks you interviewed with send welcome emails. A few folks who you didn’t even meet do so as well! They’re excited that engineering is growing. A week after you sign a box arrives on your doorstep. It contains a few books, some stickers, a DNA plush toy, a Starbucks gift card, a notebook to capture all your ideas. A metaphorical and literal fresh start. You receive your computer on or before you start. You’ve been invited to the appropriate tools including GitHub, Slack, AWS, 1Password. Your manager books time with you first thing and has already shared a 30/60/90 day plan with you in your inbox. You discuss your first coding tasks on day one. Part of your plan includes Udemy courses to support learning about your new domain. A welcome email goes out to the company on day one.Day TwoI believe that the level of engagement I describe in the five star experience goes a long way. There will always be hiccups in an employee’s experience. But welcoming and onboarding people effectively is an investment that pays dividends. Invest in that first 6 months and that employee will carry it forward for the next cohort.Apple places (or at least used to place) this note on new hires’ desks on their first day.If it’s backed by authenticity, then these welcome experiences set the tone for an employee’s time at the company.This is the standard.This is the culture.This is the expectation: for ourselves as well as you.This is how we treat coworkers.This is how we think of our products.This is how we treat our customers.Welcome. Let’s get started.",
        "url": "/essays//2020/07/17/welcome-kits.html"
      }
      ,
    
      "2020-07-10-batteries-not-included-html": {
        "title": "Batteries Not Included",
        "tags": "",
        "date": "July 10, 2020",
        "author": "",
        "category": "",
        "content": "  We just want to hire someone who can hit the ground running.  — Hiring ManagerIt’s not going to happen. Ok, that’s hyperbolic, it will almost never happen. The conditions for a new knowledge worker “hitting the ground running” are exceedingly rare.Joining a new company is a bit like an organ transplant, for both the new hire as well as the organization. And like an organ transplant, there are significant risks and adjustments that need to take place to avoid rejection. The impact is asymmetric and falls more on the new hire. The larger the organization, the larger the asymmetry becomes. A new hire in a 5 person organization has much more ability to help or hurt than a new hire in a 500 person organization.Here are a few factors to consider.  New organizations are distracting on a personal level.          Which healthcare plan should I choose?      Which 401K option do I invest in? Do I invest?      How will my commute be different?      Will anyone eat lunch with me? (Seriously, people think about this especially after leaving an environment where they are well established.)      Imposter syndrome as folks unfairly compare themselves to their established peers.        New tech stacks require time to learn. Ruby to Python isn’t a huge leap but an engineer with deep muscle memory in one will need to retrain all their instincts and knowledge. Some modeling between the two helps speed things up. Regardless, languages have their nuances that become important to understand and help a developer to be effective. For example, a new Python developer may eventually find understanding the different outcomes here helpful:    &gt;&gt;&gt; foo = 1&gt;&gt;&gt; 1 is fooTrue&gt;&gt;&gt; bar = 10000000&gt;&gt;&gt; bar is 10000000False        Even if the tech stack is the same, the code base is foreign. First, there’s learning how the code base is structured and why. Then there’s making changes and building confidence that you’re doing things right. The more established the code base, the greater the chance of there being deep-seated pitfalls that may not be immediately obvious to an engineer.  Domain knowledge is yet another dimension of knowledge to rebuild. We pay engineers (and product managers and designers) to build tools that people want to use. If they don’t understand why a user is doing something, even at a high level, then it’s difficult to be truly effective and build great things. Switching from security to genomics is a gigantic leap and potentially one of the least translatable facets of a new hire depending on their background.Ultimately, we’re paying engineers for the internalization of the lessons that they have learned in their past experiences. For folks like Site Reliability Engineers, we refer to this as the “wisdom of production” or “scar tissue”.All this to say, people don’t “hit the ground running” 99.9% of the time. The primary exception to this that I can think of is a re-hire, someone who left their current company for a tour of duty at another organization and returned. They’ll still have catch up to do as they say “What did I miss?”Let’s stop talking about “hitting the ground running”. Maybe we say an experienced candidate who has translatable domain expertise in a similar tech stack “has some assembly required”.",
        "url": "/essays//2020/07/10/batteries-not-included.html"
      }
